# your projects
projects:

- name: Infrastructure Automation & Documentation Platform
  logo: /images/sections/projects/tofu.png
  role: Infrastructure Automation Engineer
  timeline: "2025 - Present"
  summary: Designed and built a fully automated infrastructure platform using Infrastructure as Code to provision, configure, and document a reproducible homelab environment. The project focuses on end-to-end automation, from VM provisioning to service configuration and automatic documentation generation.
  details:
    - Infrastructure provisioning using OpenTofu (Terraform-compatible IaC)
    - Automated VM lifecycle management on Proxmox
    - Configuration management using Ansible and AWX
    - Git-based workflow for versioning and change tracking
    - Automated documentation generation and structured knowledge base
    - Reproducible infrastructure design (destroy & rebuild capable)
    - Experimentation with CI/CD pipelines for infrastructure workflows
  tags: ["Infrastructure", "Automation", "IaC", "Linux", "DevOps", "Git", "Proxmox"]

- name: Proxmox Infrastructure Lab
  logo: /images/sections/projects/proxmox.png
  role: Infrastructure Design & Automation
  timeline: "April 2021 - Present"
  summary: Designed and maintained a full homelab infrastructure using Proxmox to simulate production-like environments for testing automation, networking and system configuration.
  tags: ["Infrastructure", "Virtualization", "Linux", "Automation"]

- name: Security Detection & Attack Simulation Lab (Splunk)
  logo: /images/sections/projects/splunk.png
  role: Blue Team Engineering
  timeline: "Aug 2022"
  summary: Built a controlled environment to simulate attack scenarios and validate detection capabilities in Splunk, focusing on log ingestion, alerting logic and detection tuning for SOC use cases.
  tags: ["Security", "Splunk", "Detection Engineering"]

- name: Infrastructure Portfolio Platform
  logo: /images/site/main-logo.png
  role: Platform Owner
  timeline: "April 2025 - Present"
  summary: Built and deployed a personal portfolio platform using Git-based workflows, DNS configuration, and automated deployment processes to showcase infrastructure and automation projects.
  tags: ["Infrastructure", "Git", "Automation", "DevOps"]

- name: Interactive Learning Environments (Killercoda)
  logo: /images/site/Killercoda.png
  role: Content Creator
  timeline: "Aug 2024"
  url: "https://killercoda.com/splunk"
  summary: Created interactive learning environments for Splunk deployment and configuration to demonstrate real-world observability and logging setups.
  tags: ["Observability", "Splunk", "Learning", "Infrastructure"]
